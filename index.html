<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Вдохновения</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --btn-motivate: #ff4757;
            --btn-advice: #2ed573;
            --btn-hover-opacity: 0.9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
        }

        .display-area {
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        #type-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 10px;
            height: 18px;
        }

        #phrase-text {
            font-size: 1.35rem;
            line-height: 1.6;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }

        .buttons-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            flex: 1;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-m {
            background-color: var(--btn-motivate);
            color: #fff;
        }

        .btn-a {
            background-color: var(--btn-advice);
            color: #121212;
        }

        button:hover {
            opacity: var(--btn-hover-opacity);
        }

        @media (max-width: 480px) {
            .buttons-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="display-area">
            <div id="type-label">Нажми на кнопку ниже</div>
            <div id="phrase-text">Каждый день — это новый шанс стать лучше.</div>
        </div>

        <div class="buttons-group">
            <button class="btn-m" onclick="getPhrase('motivation')">Мотивация</button>
            <button class="btn-a" onclick="getPhrase('advice')">Совет</button>
        </div>
    </div>

    <script>
        // База данных фраз (по 25 в каждой категории)
        const database = {
            motivation: [
                "Успех — это способность шагать от одной неудачи к другой, не теряя энтузиазма.",
                "Твоё ограничение — это только твоё воображение.",
                "Толчок к действию нужен каждый день, как и ежедневный душ.",
                "Не жди идеального момента. Бери момент и делай его идеальным.",
                "Боль, которую ты чувствуешь сегодня, превратится в силу завтра.",
                "Если тебе тяжело, значит ты идешь в гору.",
                "Маленькие шаги каждый день ведут к большим результатам.",
                "Сделай сегодня то, о чем другие только думают.",
                "Дисциплина — это решение делать то, чего очень не хочется, чтобы достичь того, чего очень хочется.",
                "Ошибки — это доказательство того, что ты пытался.",
                "Лучший способ предсказать будущее — создать его.",
                "Секрет того, чтобы вырваться вперед — это начать.",
                "Ты никогда не переплывешь океан, если будешь бояться потерять берег из виду.",
                "Единственный тормоз на пути к завтрашним достижениям — наши сегодняшние сомнения.",
                "Всё кажется невозможным, пока не будет сделано.",
                "Действуй так, будто неудача просто невозможна.",
                "Твое время ограничено, не трать его на жизнь чужой жизнью.",
                "Ты намного сильнее, чем тебе кажется.",
                "Тяжелый труд побеждает талант, если талант не трудится.",
                "Падай семь раз, поднимайся восемь.",
                "Никогда не поздно стать тем, кем ты мог бы быть.",
                "Твоя жизнь меняется только тогда, когда меняешься ты.",
                "Препятствия — это те страшные вещи, которые ты видишь, когда отводишь взгляд от цели.",
                "Фокусируйся на прогрессе, а не на совершенстве.",
                "Либо ты управляешь днем, либо день управляет тобой."
            ],
            advice: [
                "Высыпайся. Хронический недосып незаметно разрушает твою продуктивность.",
                "Если не знаешь с чего начать — просто начни с уборки на рабочем столе.",
                "Правило двух минут: если дело занимает меньше 2 минут, сделай его прямо сейчас.",
                "Учись говорить 'нет' вещам, которые не приближают тебя к твоим целям.",
                "Записывай идеи сразу. Мозг создан для генерации мыслей, а не для их хранения.",
                "Пей чистую воду в течение дня, это напрямую влияет на фокус и энергию.",
                "Делай пятиминутный перерыв каждый час работы, чтобы размять тело.",
                "Не проверяй телефон первые 30 минут после пробуждения.",
                "В любой непонятной ситуации — иди прогуляйся на свежем воздухе.",
                "Слушай больше, чем говоришь. Из этого можно извлечь максимум пользы.",
                "Инвестируй время в изучение горячих клавиш программ, которыми часто пользуешься.",
                "Не путай активность с продуктивностью. Можно быть очень занятым, но стоять на месте.",
                "Веди учет расходов. Контроль финансов убирает лишнюю тревожность.",
                "Перед тем как ответить эмоциями, сделай глубокий вдох и посчитай до пяти.",
                "Разбивай большие и страшные задачи на мелкие, понятные подзадачи.",
                "Регулярно делай бэкапы важных данных. Всегда.",
                "Не бойся задавать 'глупые' вопросы, бойся остаться в неведении.",
                "Удаляй приложения, которыми не пользовался больше трех месяцев.",
                "Оценивай критику только от тех людей, чьи достижения ты уважаешь.",
                "Читай хотя бы 10 страниц книги в день. За год это превратится в десяток книг.",
                "Оставляй работу на работе. Твоему мозгу необходима полная перезагрузка.",
                "Формулируй свои цели письменно, а не держи их абстрактно в голове.",
                "Заменяй кофе обычной водой во второй половине дня для лучшего сна.",
                "Не пытайся нравиться всем подряд — это невыполнимая и пустая задача.",
                "Учись автоматизировать рутину, чтобы освободить время для творчества."
            ]
        };

        // Списки для отслеживания оставшихся (не показанных) фраз
        let pools = {
            motivation: [],
            advice: []
        };

        // Функция тасования массива (Алгоритм Фишера-Йетса)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Функция генерации/обновления пула фраз
        function refreshPool(type) {
            // Создаем копию индексов основного массива фраз [0, 1, 2, ..., 24]
            pools[type] = Array.from({length: database[type].length}, (_, i) => i);
            // Перемешиваем эти индексы в случайном порядке
            shuffle(pools[type]);
        }

        // Главная функция получения фразы
        function getPhrase(type) {
            // Если пул для этой категории пуст, заполняем и перемешиваем его заново
            if (pools[type].length === 0) {
                refreshPool(type);
            }

            // Забираем последний индекс из перемешанного пула (метод pop удаляет элемент)
            const phraseIndex = pools[type].pop();
            const chosenPhrase = database[type][phraseIndex];

            // Анимация быстрой смены текста
            const textElement = document.getElementById('phrase-text');
            const labelElement = document.getElementById('type-label');
            
            textElement.style.opacity = 0;
            
            setTimeout(() => {
                labelElement.innerText = type === 'motivation' ? 'Мотивация' : 'Совет';
                labelElement.style.color = type === 'motivation' ? 'var(--btn-motivate)' : 'var(--btn-advice)';
                textElement.innerText = chosenPhrase;
                textElement.style.opacity = 1;
            }, 150);
        }

        // Инициализируем пулы при первой загрузке страницы
        refreshPool('motivation');
        refreshPool('advice');
    </script>
</body>
</html>
